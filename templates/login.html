<!DOCTYPE html>
<html>
<head>
<title>Cloud Kitchen Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(135deg,#ff9966,#ff5e62);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family: Arial;
}

.login-box{
width:400px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0px 10px 25px rgba(0,0,0,0.2);
}

.title{
text-align:center;
margin-bottom:25px;
font-weight:bold;
color:#333;
}

.btn-login{
width:100%;
}

.footer{
text-align:center;
margin-top:20px;
font-size:14px;
color:gray;
}

</style>

</head>

<body>

<div class="login-box">

<h3 class="title">CLOUD KITCHEN BILLING SYSTEM</h3>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form method="POST">

<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter username" required>
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control" placeholder="Enter password" required>
</div>

<button type="submit" class="btn btn-dark btn-login">
Login
</button>

</form>

<div class="footer">

<p>Don't have an account?</p>

<a href="/register" class="btn btn-outline-dark btn-sm">
Register
</a>

</div>

</div>

</body>
</html>
