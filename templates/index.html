<!DOCTYPE html>
<html>
<head>
<title>Cloud Kitchen Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family: Arial;
margin-bottom:60px;
}

.header{
background:#0d6efd;
color:white;
padding:15px;
}

.card{
border:none;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.btn{
border-radius:8px;
}

footer{
position:fixed;
bottom:0;
width:100%;
background:black;
color:white;
text-align:center;
padding:6px;
font-size:14px;
opacity:0.85;
}

</style>

</head>

<body>

<div class="header d-flex justify-content-between">

<h3>Cloud Kitchen Dashboard</h3>

<div>

<a href="/order" class="btn btn-light">Place Order</a>

<a href="/orders" class="btn btn-warning">View Orders</a>

<a href="/logout" class="btn btn-danger">Logout</a>

</div>

</div>


<div class="container mt-4">

<div class="card p-4">

<div class="d-flex justify-content-between mb-3">

<h4>Menu Items</h4>

<a href="/add" class="btn btn-success">Add Item</a>

</div>


<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>Item Name</th>
<th>Price (₹)</th>
<th>Actions</th>
</tr>

</thead>

<tbody>

{% for item in items %}

<tr>

<td>{{ item[1] }}</td>
<td>{{ item[2] }}</td>

<td>

<a href="/edit_price/{{ item[0] }}" class="btn btn-sm btn-primary">Edit Price</a>

<a href="/delete/{{ item[0] }}" class="btn btn-sm btn-danger">Delete</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>


<footer>
© 2026 Cloud Kitchen | Developed by Preetham
</footer>

</body>
</html>
