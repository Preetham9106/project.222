<!DOCTYPE html>
<html>
<head>

<title>All Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">All Orders</h2>

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Customer Name</th>
<th>Phone</th>
<th>Items</th>
<th>Quantity</th>
<th>Total</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for order in orders %}
<tr>

<tr>

<td>{{ order[0] }}</td>
<td>{{ order[1] }}</td>
<td>{{ order[2] }}</td>
<td>{{ order[3] }}</td>
<td>{{ order[4] }}</td>
<td>₹{{ order[5] }}</td>
<td>{{ order[6] }}</td>

<td>
<a href="/delete_order/{{ order[7] }}" class="btn btn-danger btn-sm">
Delete
</a>
</td>

</tr>

</tr>


{% endfor %}

</tbody>

</table>

<div class="text-center mt-3">

<a href="/" class="btn btn-primary">
Back to Home
</a>

</div>

</div>

</body>
</html>
